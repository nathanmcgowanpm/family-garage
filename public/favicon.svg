<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Family Garage favicon — garage glyph on dark rounded square.
    32×32 canvas; 24-unit source glyph translated +4,+4 so it sits
    centred with 8px breathing room on all sides.

    rx=6  →  6/32 ≈ 19% border-radius (spec: ~20%)
    stroke-width=2  →  bumped from in-app 1.6 for legibility at 16px
  -->
  <rect width="32" height="32" rx="6" fill="#0A0C0E"/>
  <path
    d="M8 24V13l8-5 8 5v11"
    stroke="#3DD6FF"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="16" cy="17" r="2.5" fill="#3DD6FF"/>
</svg>
